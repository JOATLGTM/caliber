<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Caliber Autofill</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 14px;
        width: 300px;
        background: #0f1117;
        color: #e8eaed;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px;
        font-weight: 600;
      }
      label {
        display: block;
        font-size: 11px;
        color: #9aa0a6;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 10px;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #2a2f3a;
        background: #161922;
        color: #e8eaed;
        font-size: 12px;
      }
      button {
        width: 100%;
        padding: 9px;
        border: none;
        border-radius: 6px;
        background: #10b981;
        color: #041510;
        font-weight: 600;
        cursor: pointer;
        font-size: 13px;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #status {
        margin-top: 10px;
        font-size: 11px;
        color: #9aa0a6;
        min-height: 32px;
        line-height: 1.4;
      }
      a {
        color: #10b981;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1>Caliber Apply Autofill</h1>
    <label for="apiUrl">Caliber URL</label>
    <input id="apiUrl" type="url" placeholder="http://localhost:3000" />
    <label for="token">Access token</label>
    <input id="token" type="password" placeholder="From Settings → Browser extension" />
    <button id="fill">Fill this page</button>
    <div id="status"></div>
    <p><a href="#" id="settingsLink">Open Caliber settings</a></p>
    <script src="popup.js"></script>
  </body>
</html>
